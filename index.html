<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasting Notes | Pago & Luis Cañas</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f7f7f7;
      color: #1f1f1f;
    }

    .wrap {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .hero {
      background: #ffffff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .logo-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
    }

    .logo-box {
      height: 96px;
      border: 1px dashed #cfcfcf;
      border-radius: 10px;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .logo-box img {
      max-width: 100%;
      max-height: 72px;
      object-fit: contain;
    }

    .title {
      font-size: 28px;
      margin: 0 0 8px;
    }

    .desc {
      margin: 0;
      color: #555;
      font-size: 15px;
      line-height: 1.5;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    .wine-btn,
    .back-btn {
      border: 1px solid #d6d6d6;
      background: #fff;
      color: #1f1f1f;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .wine-btn:hover,
    .back-btn:hover {
      background: #1f1f1f;
      color: #fff;
      border-color: #1f1f1f;
    }

    .viewer {
      display: none;
      background: #ffffff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 20px;
    }

    .viewer-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .viewer-title {
      font-size: 24px;
      margin: 0;
    }

    .sheet-box {
      border: 1px dashed #ddd;
      border-radius: 12px;
      background: #fafafa;
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
    }

    .sheet-box img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
    }

    .placeholder {
      text-align: center;
      color: #777;
      font-size: 15px;
      line-height: 1.6;
      padding: 24px;
    }

    @media (max-width: 768px) {
      .logo-row {
        grid-template-columns: 1fr;
      }

      .title {
        font-size: 24px;
      }

      .viewer-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- Màn hình chính -->
    <section class="hero" id="homeScreen">
      <div class="logo-row">
        <div class="logo-box">
          <img src="logo-pago.png" alt="Pago logo" />
        </div>
        <div class="logo-box">
          <img src="logo-luis-canas.png" alt="Luis Cañas logo" />
        </div>
      </div>

      <h1 class="title">Technical Sheets</h1>
      <p class="desc">
        Chọn tên chai rượu bên dưới để xem technical sheet.
      </p>

      <div class="toolbar" id="wineButtons"></div>
    </section>

    <!-- Màn hình xem technical sheet -->
    <section class="viewer" id="viewerScreen">
      <div class="viewer-top">
        <h2 class="viewer-title" id="viewerTitle">Tên chai rượu</h2>
        <button class="back-btn" id="backBtn">← Back</button>
      </div>

      <div class="sheet-box" id="sheetBox">
        <div class="placeholder">Chưa có file technical sheet.</div>
      </div>
    </section>

  </div>

  <script>
    const wines = [
      {
        id: 'pago-la-a',
        name: 'Pago de Cirsus La A',
        image: 'Pago de Cirsus La A (EN)-01.jpg'
      },
      {
        id: 'pago-chardonnay',
        name: 'Pago de Cirsus Chardonnay',
        image: 'Pago de Cirsus Chardonnay Fermentado en Barrica (EN).jpg'
      },
      {
        id: 'pago-cuvee-especial',
        name: 'Pago de Cirsus Cuvée Especial',
        image: 'Pago de Cirsus Cuvee Especial (EN) (1).jpg'
      },
      {
        id: 'pago-vendimia',
        name: 'Pago de Cirsus Vendimia Seleccionada',
        image: 'Pago de Cirsus Vendimia Seleccionada Edición Especial (Limited Edition) (EN) (1).jpg'
      },
      {
        id: 'luis-vinas-viejas-blanco',
        name: 'Luis Cañas Viñas Viejas Blanco',
        image: 'Luis Cañas Vinas Viejas Blanco En copy.jpg'
      },
      {
        id: 'luis-gran-reserva',
        name: 'Luis Cañas Gran Reserva',
        image: 'Luis Cañas Gran Reserva (EN).jpg'
      },
      {
        id: 'luis-hiru-3-racimos',
        name: 'Luis Cañas Hiru 3 Racimos',
        image: 'Luis Cañas Hiru 3 Racimos (EN).jpg'
      },
      {
        id: 'luis-maceracion-carbonica',
        name: 'Luis Cañas Tinto Maceración Carbónica',
        image: 'Luis Cañas Tinto Maceración Carbónica (EN) (1).jpg'
      },
      {
        id: 'luis-crianza',
        name: 'Luis Cañas Crianza',
        image: ''
      },
      {
        id: 'luis-reserva-familia',
        name: 'Luis Cañas Reserva Familia',
        image: 'Luis Cañas Reserva Familia (EN) copy.jpg'
      }
    ];

    const wineButtons = document.getElementById('wineButtons');
    const homeScreen = document.getElementById('homeScreen');
    const viewerScreen = document.getElementById('viewerScreen');
    const viewerTitle = document.getElementById('viewerTitle');
    const sheetBox = document.getElementById('sheetBox');
    const backBtn = document.getElementById('backBtn');

    function renderButtons() {
      wineButtons.innerHTML = '';

      wines.forEach((wine) => {
        const button = document.createElement('button');
        button.className = 'wine-btn';
        button.textContent = wine.name;

        button.addEventListener('click', () => {
          openWineSheet(wine);
        });

        wineButtons.appendChild(button);
      });
    }

    function openWineSheet(wine) {
      viewerTitle.textContent = wine.name;

      if (wine.image) {
        sheetBox.innerHTML = `
          <img 
            src="${wine.image}" 
            alt="${wine.name}" 
            onerror="this.parentElement.innerHTML='<div class=&quot;placeholder&quot;>Không tìm thấy file ảnh.<br>Hãy kiểm tra lại tên file và đảm bảo ảnh đã được upload cùng cấp với index.html.</div>'"
          />
        `;
      } else {
        sheetBox.innerHTML = `
          <div class="placeholder">
            Chưa gắn file technical sheet cho chai này.
          </div>
        `;
      }

      homeScreen.style.display = 'none';
      viewerScreen.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    backBtn.addEventListener('click', () => {
      viewerScreen.style.display = 'none';
      homeScreen.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    renderButtons();
  </script>
</body>
</html>
