<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Technical Sheets | Luis Cañas & Pago de Cirsus</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f7f7f7;
      color: #1f1f1f;
    }

    .wrap {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .hero,
    .viewer {
      background: #ffffff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 24px;
    }

    .title {
      font-size: 28px;
      margin: 0 0 8px;
    }

    .desc {
      margin: 0;
      color: #555;
      font-size: 15px;
      line-height: 1.5;
    }

    .brand-section {
      margin-top: 32px;
      padding-top: 28px;
      border-top: 1px solid #ececec;
    }

    .brand-section:first-of-type {
      margin-top: 24px;
      padding-top: 0;
      border-top: 0;
    }

    .brand-logo-box {
      min-height: 88px;
      border: 1px dashed #cfcfcf;
      border-radius: 12px;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      margin-bottom: 16px;
    }

    .brand-logo-box img {
      max-width: 100%;
      max-height: 58px;
      object-fit: contain;
      display: block;
    }

    .brand-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .wine-btn,
    .back-btn {
      border: 1px solid #d6d6d6;
      background: #fff;
      color: #1f1f1f;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .wine-btn:hover,
    .back-btn:hover {
      background: #1f1f1f;
      color: #fff;
      border-color: #1f1f1f;
    }

    .viewer {
      display: none;
    }

    .viewer-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .viewer-title {
      font-size: 24px;
      margin: 0;
    }

    .sheet-box {
      border: 1px dashed #ddd;
      border-radius: 12px;
      background: #fafafa;
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
    }

    .sheet-box img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
    }

    .placeholder {
      text-align: center;
      color: #777;
      font-size: 15px;
      line-height: 1.6;
      padding: 24px;
    }

    @media (max-width: 768px) {
      .wrap {
        width: min(100%, calc(100% - 24px));
        padding: 20px 0 32px;
      }

      .title {
        font-size: 24px;
      }

      .viewer-title {
        font-size: 20px;
      }

      .brand-logo-box {
        min-height: 76px;
        padding: 14px;
      }

      .brand-logo-box img {
        max-height: 46px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- Màn hình chính -->
    <section class="hero" id="homeScreen">
      <h1 class="title">Technical Sheets</h1>
      <p class="desc">
        Chọn tên chai rượu bên dưới để xem technical sheet.
      </p>

      <div id="wineSections"></div>
    </section>

    <!-- Màn hình xem technical sheet -->
    <section class="viewer" id="viewerScreen">
      <div class="viewer-top">
        <h2 class="viewer-title" id="viewerTitle">Tên chai rượu</h2>
        <button class="back-btn" id="backBtn">← Back</button>
      </div>

      <div class="sheet-box" id="sheetBox">
        <div class="placeholder">Chưa có file technical sheet.</div>
      </div>
    </section>

  </div>

  <script>
    const wines = [
      {
        id: 'luis-vinas-viejas-blanco',
        brand: 'luis',
        name: 'Luis Cañas Viñas Viejas Blanco',
        image: 'Luis Cañas Vinas Viejas Blanco En copy.jpg'
      },
      {
        id: 'luis-gran-reserva',
        brand: 'luis',
        name: 'Luis Cañas Gran Reserva',
        image: 'Luis Cañas Gran Reserva (EN).jpg'
      },
      {
        id: 'luis-hiru-3-racimos',
        brand: 'luis',
        name: 'Luis Cañas Hiru 3 Racimos',
        image: 'Luis Cañas Hiru 3 Racimos (EN).jpg'
      },
      {
        id: 'luis-maceracion-carbonica',
        brand: 'luis',
        name: 'Luis Cañas Tinto Maceración Carbónica',
        image: 'Luis Cañas Tinto Maceración Carbónica (EN) (1).jpg'
      },
      {
        id: 'luis-crianza',
        brand: 'luis',
        name: 'Luis Cañas Crianza',
        image: 'Luis Cañas Crianza (EN).jpg'
      },
      {
        id: 'luis-reserva-familia',
        brand: 'luis',
        name: 'Luis Cañas Reserva Familia',
        image: 'Luis Cañas Reserva Familia (EN) copy.jpg'
      },
      {
        id: 'pago-la-a',
        brand: 'pago',
        name: 'Pago de Cirsus La A',
        image: 'Pago de Cirsus La A (EN)-01.jpg'
      },
      {
        id: 'pago-chardonnay',
        brand: 'pago',
        name: 'Pago de Cirsus Chardonnay',
        image: 'Pago de Cirsus Chardonnay Fermentado en Barrica (EN).jpg'
      },
      {
        id: 'pago-cuvee-especial',
        brand: 'pago',
        name: 'Pago de Cirsus Cuvée Especial',
        image: 'Pago de Cirsus Cuvee Especial (EN) (1).jpg'
      },
      {
        id: 'pago-vendimia',
        brand: 'pago',
        name: 'Pago de Cirsus Vendimia Seleccionada',
        image: 'Pago de Cirsus Vendimia Seleccionada Edición Especial (Limited Edition) (EN) (1).jpg'
      }
    ];

    const brands = [
      {
        id: 'luis',
        logo: 'luis-canas-logo-png-transparent.png',
        alt: 'Luis Cañas logo'
      },
      {
        id: 'pago',
        logo: 'Logo_PAGO-de-CIRSUS-Full-01.png',
        alt: 'Pago de Cirsus logo'
      }
    ];

    const wineSections = document.getElementById('wineSections');
    const homeScreen = document.getElementById('homeScreen');
    const viewerScreen = document.getElementById('viewerScreen');
    const viewerTitle = document.getElementById('viewerTitle');
    const sheetBox = document.getElementById('sheetBox');
    const backBtn = document.getElementById('backBtn');

    function renderHomeSections() {
      wineSections.innerHTML = '';

      brands.forEach((brand) => {
        const section = document.createElement('div');
        section.className = 'brand-section';

        const brandWines = wines.filter((wine) => wine.brand === brand.id);

        section.innerHTML = `
          <div class="brand-logo-box">
            <img src="${brand.logo}" alt="${brand.alt}" />
          </div>
          <div class="brand-buttons"></div>
        `;

        const buttonContainer = section.querySelector('.brand-buttons');

        brandWines.forEach((wine) => {
          const button = document.createElement('button');
          button.className = 'wine-btn';
          button.textContent = wine.name;

          button.addEventListener('click', () => {
            openWineSheet(wine);
          });

          buttonContainer.appendChild(button);
        });

        wineSections.appendChild(section);
      });
    }

    function openWineSheet(wine) {
      viewerTitle.textContent = wine.name;

      if (wine.image) {
        sheetBox.innerHTML = `
          <img
            src="${wine.image}"
            alt="${wine.name}"
            onerror="this.parentElement.innerHTML='<div class=&quot;placeholder&quot;>Không tìm thấy file ảnh.<br>Hãy kiểm tra lại tên file và đảm bảo ảnh đã được upload cùng cấp với index.html.</div>'"
          />
        `;
      } else {
        sheetBox.innerHTML = `
          <div class="placeholder">
            Chưa gắn file technical sheet cho chai này.
          </div>
        `;
      }

      homeScreen.style.display = 'none';
      viewerScreen.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    backBtn.addEventListener('click', () => {
      viewerScreen.style.display = 'none';
      homeScreen.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    renderHomeSections();
  </script>
</body>
</html>
